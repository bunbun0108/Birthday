<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Happy Birthday DD! ☕🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%; height: 100%;
            /* New Aesthetic Coffee/Bun Bun Background */
            background: #fdf5e6;
            background-image: radial-gradient(#e6d5b8 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            color: #4E342E;
            overflow: hidden;
            position: relative;
        }

        /* Music Toggle Button */
        #music-btn {
            position: absolute; top: 20px; right: 20px;
            z-index: 100; background: #fff; border: 2px solid #4A3026;
            border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 4px 0 #4A3026;
        }

        /* Screen Management */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.5s ease;
        }
        .hidden { display: none !important; }

        h1.title {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem; text-align: center; margin-bottom: 2rem;
            color: #4A3026;
        }

        .btn {
            background-color: #d6917a; color: #FFF;
            border: 3px solid #4A3026; border-radius: 40px;
            padding: 15px 35px; font-size: 1.1rem; font-weight: 700;
            box-shadow: 0 6px 0px #4A3026; cursor: pointer;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #4A3026; }

        /* Pixelated Cute Cake Layers */
        #cake-container {
            position: relative; width: 220px; height: 250px;
            display: flex; justify-content: center;
        }
        .layer {
            position: absolute; border: 4px solid #4A3026;
            image-rendering: pixelated;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .layer::after { /* Pixel decoration */
            content: ''; position: absolute; top: 5px; left: 5px;
            width: 10px; height: 10px; background: rgba(255,255,255,0.3);
        }

        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* Candle & Flame */
        #candle {
            width: 12px; height: 40px; background: #ffb7c5;
            border: 3px solid #4A3026; position: absolute; bottom: 130px;
            display: none; z-index: 50;
        }
        #flame {
            position: absolute; top: -45px; left: -10px; font-size: 35px;
            display: none; animation: flicker 0.2s infinite;
        }
        @keyframes flicker { 0% { opacity: 0.8; } 100% { opacity: 1; } }

        #lighter { font-size: 3rem; position: absolute; display: none; z-index: 200; }

        /* Pressure UI */
        #pressure-ui {
            position: absolute; top: 15%; width: 80%; background: #fff;
            border: 3px solid #4A3026; padding: 10px; border-radius: 15px;
            display: none; text-align: center;
        }
        #bar-bg { width: 100%; height: 20px; background: #eee; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: #ffb7c5; transition: width 0.1s; }

        /* Polaroid Album */
        .polaroid {
            background: #FFF; padding: 10px 10px 30px 10px;
            border: 2px solid #4A3026; position: absolute;
            transition: 0.5s; opacity: 0; transform: scale(0.5);
        }
        .polaroid img { width: 200px; height: 200px; object-fit: cover; }
        .polaroid.show { opacity: 1; transform: scale(1) rotate(var(--rot)); }

        #end-msg {
            font-family: 'Caveat', cursive; font-size: 2.5rem;
            text-align: center; display: none; color: #4A3026;
        }
    </style>
</head>
<body>

    <button id="music-btn">🎵</button>

    <div id="screen-landing" class="screen">
        <h1 class="title">Happy Birthday DD!</h1>
        <button class="btn" id="go-to-cake">Start Surprise</button>
    </div>

    <div id="screen-cake" class="screen hidden">
        <div id="cake-container">
            <div id="candle"><div id="flame">🔥</div></div>
        </div>
        <button class="btn" id="add-layer">Put Layer</button>
        <button class="btn hidden" id="get-lighter">Get Lighter Gun</button>
    </div>

    <div id="lighter">🔫</div>

    <div id="pressure-ui">
        <h3>TAP FAST TO BLOW!</h3>
        <div id="bar-bg"><div id="bar-fill"></div></div>
    </div>

    <div id="screen-album" class="screen hidden">
        <div id="end-msg">May God Bless You Always DD! ❤️</div>
    </div>

    <script>
        let layerCount = 0;
        let pressure = 0;
        let isLit = false;
        
        // Cake Logic
        const cakeSizes = [200, 160, 120, 80];
        const cakeColors = ['#A67B69', '#D6917A', '#F5DFD3', '#FFF8E7'];

        document.getElementById('add-layer').onclick = () => {
            if(layerCount < 4) {
                const l = document.createElement('div');
                l.className = 'layer';
                l.style.width = cakeSizes[layerCount] + 'px';
                l.style.height = '40px';
                l.style.background = cakeColors[layerCount];
                l.style.bottom = (layerCount * 35) + 'px';
                l.style.left = ((220 - cakeSizes[layerCount])/2) + 'px';
                document.getElementById('cake-container').appendChild(l);
                layerCount++;
            }
            if(layerCount === 4) {
                document.getElementById('add-layer').classList.add('hidden');
                document.getElementById('candle').style.display = 'block';
                document.getElementById('get-lighter').classList.remove('hidden');
            }
        };

        // Screen Logic
        document.getElementById('go-to-cake').onclick = () => {
            document.getElementById('screen-landing').classList.add('hidden');
            document.getElementById('screen-cake').classList.remove('hidden');
        };

        // Lighter Logic
        const lighter = document.getElementById('lighter');
        document.getElementById('get-lighter').onclick = () => {
            document.getElementById('get-lighter').classList.add('hidden');
            lighter.style.display = 'block';
        };

        window.addEventListener('touchmove', (e) => {
            if(lighter.style.display === 'block' && !isLit) {
                let t = e.touches[0];
                lighter.style.left = (t.clientX - 25) + 'px';
                lighter.style.top = (t.clientY - 25) + 'px';
                
                let c = document.getElementById('candle').getBoundingClientRect();
                if(t.clientX > c.left && t.clientX < c.right && t.clientY > c.top && t.clientY < c.bottom) {
                    document.getElementById('flame').style.display = 'block';
                    isLit = true;
                    setTimeout(startBlowing, 1000);
                }
            }
        });

        function startBlowing() {
            lighter.style.display = 'none';
            document.getElementById('pressure-ui').style.display = 'block';
            window.onclick = () => {
                if(isLit) {
                    pressure += 15;
                    document.getElementById('bar-fill').style.width = pressure + '%';
                    if(pressure >= 100) {
                        isLit = false;
                        document.getElementById('flame').style.display = 'none';
                        document.getElementById('pressure-ui').style.display = 'none';
                        setTimeout(showAlbum, 1000);
                    }
                }
            };
            setInterval(() => { if(pressure > 0) pressure -= 2; }, 100);
        }

        // Final Album Logic
        const photos = ['1.jpeg', '2.jpeg', '3.jpeg', '4.jpeg', '5.jpeg', '6.jpeg'];
        let pIdx = 0;

        function showAlbum() {
            document.getElementById('screen-cake').classList.add('hidden');
            document.getElementById('screen-album').classList.remove('hidden');
            nextPhoto();
        }

        function nextPhoto() {
            if(pIdx >= photos.length) {
                document.getElementById('end-msg').style.display = 'block';
                return;
            }
            const p = document.createElement('div');
            p.className = 'polaroid';
            p.innerHTML = `<img src="${photos[pIdx]}">`;
            p.style.setProperty('--rot', (Math.random() * 20 - 10) + 'deg');
            p.style.left = (Math.random() * 20 + 20) + '%';
            p.style.top = (Math.random() * 20 + 20) + '%';
            document.getElementById('screen-album').appendChild(p);
            setTimeout(() => p.classList.add('show'), 100);
            
            p.onclick = () => {
                p.style.opacity = '0';
                pIdx++;
                setTimeout(() => { p.remove(); nextPhoto(); }, 500);
            };
        }
    </script>
</body>
</html>
